<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Live HTML editor</title>
  <link rel="stylesheet" href="../styles.css">
  <style>textarea{width:100%;height:200px;font-family:monospace}</style>
</head>
<body>
  <main>
    <h1>Live HTML Editor</h1>
    <p>Type HTML on the left, then click "Run" to render it on the right.</p>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;align-items:start">
      <div>
        <textarea id="source">&lt;h2&gt;Hello from the editor&lt;/h2&gt;
&lt;p&gt;Edit this HTML and click Run.&lt;/p&gt;</textarea>
        <button id="run">Run</button>
      </div>
      <div>
        <iframe id="preview" style="width:100%;height:260px;border:1px solid #cbd5e1"></iframe>
      </div>
    </div>

    <script>
      const run = () => {
        const src = document.getElementById('source').value;
        const frame = document.getElementById('preview');
        frame.srcdoc = src;
      };
      document.getElementById('run').addEventListener('click', run);
      run();
    </script>
  </main>
</body>
</html>

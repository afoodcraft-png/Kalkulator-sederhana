<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Forms</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <main>
    <h1>HTML Forms</h1>
    <form id="sampleForm">
      <label>Full name<br><input type="text" name="fullname" required></label><br><br>
      <label>Email<br><input type="email" name="email" required></label><br><br>
      <button type="submit">Submit</button>
    </form>

    <div id="result" style="margin-top:12px;color:green"></div>

    <script>
      document.getElementById('sampleForm').addEventListener('submit', function(e){
        e.preventDefault();
        const f = new FormData(e.target);
        document.getElementById('result').textContent = `Thanks, ${f.get('fullname')} — we'll contact ${f.get('email')}.`;
      });
    </script>
  </main>
</body>
</html>
